version: 2
updates:
  # Before merging Actions PRs, verify the version tag actually exists on GitHub.
  # Dependabot has been known to propose non-existent major versions (e.g. v6).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
